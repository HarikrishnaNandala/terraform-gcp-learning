name: 07 - Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'       # ← only triggers if terraform files changed
  workflow_dispatch:

env:
  TF_VERSION: "1.14.8"
  WORKING_DIR: "./terraform"

jobs:

  # ── Job 1 — Format Check ────────────────────────
  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

  # ── Job 2 — Validate ───────────────────────────
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    needs: fmt-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

  # ── Job 3 — Plan ───────────────────────────────
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: validate
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "📋 Running Terraform Plan..."
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="region=${{ vars.GCP_REGION }}" \
            -var="environment=dev" \
            -out=tfplan
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  # ── Job 4 — Apply ──────────────────────────────
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: plan
    environment: production        # ← uses environment protection rules
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "🚀 Applying Terraform changes..."
          terraform apply -auto-approve tfplan
          echo "✅ Apply complete!"

      - name: Show Outputs
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "==============================="
          echo "📦 Terraform Outputs"
          echo "==============================="
          terraform output
          echo "==============================="
