name: 03 - Add Two Numbers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  # ── Job 1 — Define the numbers ─────────────────
  set-numbers:
    runs-on: ubuntu-latest
    outputs:
      number_a: ${{ steps.set.outputs.number_a }}
      number_b: ${{ steps.set.outputs.number_b }}
    steps:
      - name: Set number A and number B
        id: set
        run: |
          echo "number_a=15" >> $GITHUB_OUTPUT
          echo "number_b=27" >> $GITHUB_OUTPUT

      - name: Confirm numbers are set
        id: confirm
        run: |
          echo "📌 Number A = 15"
          echo "📌 Number B = 27"

  # ── Job 2 — Add the numbers ────────────────────
  add-numbers:
    runs-on: ubuntu-latest
    needs: set-numbers
    outputs:
      result: ${{ steps.calculate.outputs.result }}
    steps:
      - name: Retrieve numbers and calculate
        id: calculate
        run: |
          A=${{ needs.set-numbers.outputs.number_a }}
          B=${{ needs.set-numbers.outputs.number_b }}
          RESULT=$((A + B))
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "➕ $A + $B = $RESULT"

  # ── Job 3 — Show the final result ──────────────
  show-result:
    runs-on: ubuntu-latest
    needs: add-numbers
    steps:
      - name: Display the final result
        run: |
          echo "==============================="
          echo "🧮 Addition Result"
          echo "==============================="
          echo "➕ Result = ${{ needs.add-numbers.outputs.result }}"
          echo "==============================="
